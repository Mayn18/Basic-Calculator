<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Calculator</title>
</head>

<body>
    <div class="main">
        <div class="view-port">
            <input type="text" name="main" id="text-field">
        </div>
        <div class="button-panel">
            <div class="function-buttons">
                <button class="button-group function-buttons" id="btn-clr">C</button>
                <button class="button-group function-buttons" id="btn-del">Del</button>
            </div>
            <div>
                <button class="button-group num-buttons" id="btn1">1</button>
                <button class="button-group num-buttons" id="btn2">2</button>
                <button class="button-group num-buttons" id="btn3">3</button>
                <button class="button-group operator-buttons" id="btn-add">+</button>
            </div>
            <div>
                <button class="button-group num-buttons" id="btn4">4</button>
                <button class="button-group num-buttons" id="btn5">5</button>
                <button class="button-group num-buttons" id="btn6">6</button>
                <button class="button-group operator-buttons" id="btn-minus">-</button>
            </div>
            <div>
                <button class="button-group num-buttons" id="btn7">7</button>
                <button class="button-group num-buttons" id="btn8">8</button>
                <button class="button-group num-buttons" id="btn9">9</button>
                <button class="button-group operator-buttons" id="btn-multiply">*</button>
            </div>
            <div>
                <button class="button-group operator-buttons" id="btn-decimal">.</button>
                <button class="button-group num-buttons" id="btn0">0</button>
                <button class="button-group operator-buttons" id="btn-equals">=</button>
                <button class="button-group operator-buttons" id="btn-divide">/</button>
            </div>
        </div>
    </div>
</body>

</html>
